<!DOCTYPE html>
<html lang="en" <head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - LMS</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: url('assets/login-bg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-color: #9d853d;
    }

    .login-card {
        width: 100%;
        max-width: 400px;
        background-image: url('assets/card-bg.png');
        background-size: cover;
        background-position: center;
        background-color: rgb(255, 255, 255);
        /* Fallback */
        padding: 40px;
        border-radius: var(--border-radius);
        box-shadow: var(--shadow-md);
    }

    .brand-logo {
        text-align: center;
        margin-bottom: 30px;
    }

    .brand-logo svg {
        width: 60px;
        height: 60px;
        color: var(--primary-color);
    }

    .brand-name {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-main);
        margin-top: 10px;
    }

    .login-btn {
        width: 100%;
        margin-top: 10px;
    }

    .signup-link {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9rem;
        color: var(--text-light);
    }

    .signup-link a {
        color: var(--primary-color);
        font-weight: 600;
    }

    .btn-social {
        width: 100%;
        background-color: white;
        border: 1px solid #dcdcdc;
        color: var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 12px;
        font-weight: 500;
    }

    .btn-social:hover {
        background-color: #f8f9fa;
        border-color: #c4c4c4;
    }

    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 24px 0;
        color: var(--text-light);
        font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid var(--border-color);
    }

    .divider:not(:empty)::before {
        margin-right: 15px;
    }

    .divider:not(:empty)::after {
        margin-left: 15px;
    }
</style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-logo" style="display: flex; justify-content: center; align-items: center;">
                <img src="assets/dr-aruna-logo.png" alt="Dr. Aruna University Logo"
                    style="max-height: 100px; margin-bottom: 20px; width: auto; object-fit: contain;">
            </div>

            <!-- Alternative Logins -->
            <button class="btn btn-social" id="googleLoginBtn" type="button">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                Continue with Google
            </button>
            <button class="btn btn-social" id="emailLoginToggleBtn" type="button">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                Continue with Email
            </button>

            <div class="divider" id="loginDivider" style="display: none;">or log in with email</div>

            <form id="loginForm" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="student@example.com"
                        value="student@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" value="password"
                        required>
                </div>

                <div class="flex-between" style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="forgotpassword.html" class="forgot-password"
                        style="font-size: 0.9rem; color: var(--text-light);">Forgot
                        password?</a>
                </div>

                <button type="submit" class="btn btn-primary login-btn">Sign In</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="signup.html">Create Account</a>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
